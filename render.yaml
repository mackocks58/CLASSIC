services:
  - type: web
    name: classic-maximize-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: FIREBASE_TYPE
        fromFile: serviceAccount.json
    staticSite:
      buildCommand: npm run build
      publishPath: FRONTEND
