<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bind Account - Botswana</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffd700;
            --dark: #0f0f1a;
            --light: #f0f0ff;
            --danger: #ff0055;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* NOTIFICATION STYLES */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateX(120%);
            animation: slideIn 0.5s forwards, fadeOut 0.5s forwards 3s;
        }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        .notification i {
            margin-right: 10px;
            font-size: 20px;
        }
        
        .notification.success {
            background-color: var(--secondary);
            color: #000;
        }
        
        .notification.error {
            background-color: var(--danger);
            color: white;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary);
            font-weight: 500;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--secondary);
            border-radius: 8px;
            color: var(--light);
            font-size: 16px;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.3);
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 215, 0, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
        }
        
        /* Password Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        
        .modal-content {
            background: var(--dark);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--secondary);
        }
        
        .modal-title {
            color: var(--secondary);
            margin-bottom: 20px;
            text-align: center;
            font-size: 20px;
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1002;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            display: inline-block;
            position: relative;
        }
        
        .spinner::after,
        .spinner::before {
            content: '';  
            box-sizing: border-box;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            position: absolute;
            left: 0;
            top: 0;
            animation: spinner-anim 1s linear infinite;
        }
        
        .spinner::after {
            animation-delay: 0.1s;
        }
        
        @keyframes spinner-anim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
        
        .loading-text {
            color: var(--secondary);
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            input, select {
                padding: 12px;
                font-size: 15px;
            }
            
            .btn {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Please Wait...</div>
    </div>
    
    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <div class="modal-title">Verify Your Password</div>
            <div class="form-group">
                <label for="password">Enter your password to continue</label>
                <input type="password" id="password" placeholder="Your password">
            </div>
            <button class="btn" id="verifyPasswordBtn">Continue</button>
        </div>
    </div>
    
    <div class="container">
        <h1>Bind Withdrawal Account</h1>
        
        <div class="form-group">
            <label for="fullName">Full Name (3 names)</label>
            <input type="text" id="fullName" placeholder="e.g., John M. Doe">
        </div>
        
        <div class="form-group">
            <label for="network">Mobile Network</label>
            <select id="network">
                <option value="">--Select network--</option>
                <option value="Mascom MyZaka">Mascom MyZaka</option>
                <option value="Orange Money">Orange Money</option>
                <option value="BeMobile Money">BeMobile Money</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input type="tel" id="phoneNumber" placeholder="e.g., 71234567" inputmode="numeric">
            <small style="color: #aaa;">Botswana number: 8 digits starting with 7 (e.g., 71234567)</small>
        </div>
        
        <button class="btn" id="saveBtn">Save Details</button>
    </div>

    <script src="bind.js"></script>
</body>
</html>
