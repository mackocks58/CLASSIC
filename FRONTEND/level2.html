<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team 2</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: black; /* Changed to black */
      color: #FFD700; /* Changed to yellow */
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #FFD700; /* Changed to yellow */
    }
    .back-button {
      display: inline-block;
      margin-bottom: 20px;
      padding-left: 0px;
      color: #FFD700; /* Changed to yellow */
      text-decoration: none;
      border-radius: 4px;
      font-size: 30px;
      padding-top: 1px;
    }
    .input-group {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }
    .input-group input {
      flex: 1;
      padding: 10px;
      background: black; /* Changed to black */
      color: #FFD700; /* Changed to yellow */
      border: 1px solid #FFD700; /* Added yellow border */
    }
    .input-group button {
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #FFD700; /* Changed to yellow */
      color: black; /* Changed to black */
      border: none;
    }
    .search-icon {
      cursor: pointer;
      font-size: 20px;
      color: #FFD700; /* Changed to yellow */
      margin-left: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #FFD700; /* Changed to yellow */
      color: #FFD700; /* Changed to yellow */
    }
    th {
      background-color: black; /* Changed to black */
      color: #FFD700; /* Changed to yellow */
      font-weight: bold;
    }
    tr:hover {
      background-color: #333; /* Dark gray for hover */
    }
    .status-approved {
      color: #FFD700; /* Changed to yellow */
      font-weight: bold;
    }
    .status-pending {
      color: #FFD700; /* Changed to yellow */
      font-weight: bold;
    }
    .status-other {
      color: #FFD700; /* Changed to yellow */
      font-weight: bold;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8); /* Darkened overlay */
    }
    .modal-content {
      background-color: black; /* Changed to black */
      margin: 15% auto;
      padding: 20px;
      border: 1px solid #FFD700; /* Changed to yellow */
      width: 80%;
      max-width: 500px;
      border-radius: 5px;
      color: #FFD700; /* Changed to yellow */
    }
    .close {
      color: #FFD700; /* Changed to yellow */
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover {
      color: #FFD700; /* Changed to yellow */
    }
    .search-input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      box-sizing: border-box;
      background: black; /* Changed to black */
      color: #FFD700; /* Changed to yellow */
      border: 1px solid #FFD700; /* Added yellow border */
    }
    .search-button {
      background-color: #FFD700; /* Changed to yellow */
      color: black; /* Changed to black */
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 4px;
    }
    .search-button:hover {
      background-color: black; /* Changed to black */
      color: #FFD700; /* Changed to yellow */
      border: 1px solid #FFD700; /* Added yellow border */
    }
    /* Loading spinner styles */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .dot-spinner {
      --uib-size: 40px;
      --uib-speed: .9s;
      --uib-color: #FFD700; /* Changed to yellow */
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: var(--uib-size);
      width: var(--uib-size);
    }
    .dot-spinner__dot {
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      height: 100%;
      width: 100%;
    }
    .dot-spinner__dot::before {
      content: '';
      height: 20%;
      width: 20%;
      border-radius: 50%;
      background-color: var(--uib-color);
      transform: scale(0);
      opacity: 0.5;
      animation: pulse calc(var(--uib-speed) * 1.111) ease-in-out infinite;
    }
    .dot-spinner__dot:nth-child(2) {
      transform: rotate(45deg);
    }
    .dot-spinner__dot:nth-child(2)::before {
      animation-delay: calc(var(--uib-speed) * -0.875);
    }
    .dot-spinner__dot:nth-child(3) {
      transform: rotate(90deg);
    }
    .dot-spinner__dot:nth-child(3)::before {
      animation-delay: calc(var(--uib-speed) * -0.75);
    }
    .dot-spinner__dot:nth-child(4) {
      transform: rotate(135deg);
    }
    .dot-spinner__dot:nth-child(4)::before {
      animation-delay: calc(var(--uib-speed) * -0.625);
    }
    .dot-spinner__dot:nth-child(5) {
      transform: rotate(180deg);
    }
    .dot-spinner__dot:nth-child(5)::before {
      animation-delay: calc(var(--uib-speed) * -0.5);
    }
    .dot-spinner__dot:nth-child(6) {
      transform: rotate(225deg);
    }
    .dot-spinner__dot:nth-child(6)::before {
      animation-delay: calc(var(--uib-speed) * -0.375);
    }
    .dot-spinner__dot:nth-child(7) {
      transform: rotate(270deg);
    }
    .dot-spinner__dot:nth-child(7)::before {
      animation-delay: calc(var(--uib-speed) * -0.25);
    }
    .dot-spinner__dot:nth-child(8) {
      transform: rotate(315deg);
    }
    .dot-spinner__dot:nth-child(8)::before {
      animation-delay: calc(var(--uib-speed) * -0.125);
    }
    @keyframes pulse {
      0%,
      100% {
        transform: scale(0);
        opacity: 0.5;
      }
      50% {
        transform: scale(1);
        opacity: 1;
      }
    }
    .loading-text {
      margin-top: 10px;
      color: #FFD700; /* Changed to yellow */
      font-weight: bold;
    }
    h3 {
        color: #FFD700;
        font-weight: bold;
        font-size: 24px;
    }
  </style>
</head>
<body>
    <h3>LEVEL 2</h3>
  <!-- Loading Spinner -->
  <div class="loading-spinner" id="loadingSpinner">
    <div class="dot-spinner">
      <div class="dot-spinner__dot"></div>
      <div class="dot-spinner__dot"></div>
    </div>
    <div class="loading-text"></div>
  </div>

  <div class="container">
    <h1><i class="fas fa-search search-icon" id="searchButton"></i></h1>

    <table id="referrals-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Phone</th>
          <th>Signup Date</th>
        </tr>
      </thead>
      <tbody id="referrals-list">
        <!-- Content will be loaded here -->
      </tbody>
    </table>
  </div>

  <!-- Search Modal -->
  <div id="searchModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Search by Signup Date</h2>
      <input type="date" id="dateSearch" class="search-input" placeholder="Enter date (YYYY-MM-DD)">
      <button onclick="searchByDate()" class="search-button">Search</button>
      <div id="searchResults" style="margin-top: 15px;"></div>
    </div>
  </div>

  <script src="level2.js"></script>
  <script src="logout.js"></script>
</body>
</html>
