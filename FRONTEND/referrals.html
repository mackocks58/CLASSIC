<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CLASSIC MAXIMIZE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #000000;
            color: #ffd700;
            min-height: 100vh;
            padding: 20px;
            
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background-color: #000;
            color: #ffd700;
            padding: 15px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffd700;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-links a {
            color: #ffd700;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 5px;
            border: 1px solid #ffd700;
            transition: all 0.3s;
        }
        
        .nav-links a:hover {
            background-color: #ffd700;
            color: #000;
        }
        
        .dashboard-title {
            margin: 20px 0;
            text-align: center;
            color: #ffd700;
            font-size: 32px;
        }
        
        /* Total Referrals Box */
        .total-referrals-box {
            background-color: #000;
            color: #ffd700;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            margin-bottom: 30px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        
        .total-referrals-box h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }
        
        .total-count {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
        }
        
        /* Referral Levels Grid */
        .referral-levels {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .level-box {
            background-color: #000;
            color: #ffd700;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ffd700;
            transition: all 0.3s;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }
        
        .level-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            background-color: #ffd700;
            color: #000;
        }
        
        .level-title {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .level-count {
            font-size: 32px;
            font-weight: bold;
        }
        
        /* For the last single box */
        .level-box.single {
            grid-column: span 2;
        }
        
        /* Responsive Design */
        @media (min-width: 768px) {
            .referral-levels {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .level-box.single {
                grid-column: span 1;
            }
        }
        
        @media (min-width: 1024px) {
            .referral-levels {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .level-box.single {
                grid-column: span 1;
            }
            
            .level-box:nth-child(5) {
                grid-column: 2 / span 2;
            }
        }
        
        footer {
            background-color: #000;
            color: #ffd700;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            border-top: 2px solid #ffd700;
        }
        
        .loading {
            text-align: center;
            padding: 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">CLASSIC MAXIMIZE</div>
            <nav class="nav-links">
                <a href="#" id="logoutBtn">Logout</a>
            </nav>
        </div>
    </header>
    
    <div class="container">
        <h1 class="dashboard-title">User Dashboard</h1>
        
        <!-- Total Referrals Box -->
        <div class="total-referrals-box">
            <h2>Total Referrals</h2>
            <div class="total-count" id="totalReferrals">0</div>
        </div>
        
        <!-- Referral Levels Grid -->
        <div class="referral-levels">
            <div class="level-box" onclick="window.location.href='level1.html'">
                <div class="level-title">Level 1 Referrals</div>
                <div class="level-count" id="level1Count">0</div>
            </div>
            
            <div class="level-box" onclick="window.location.href='level2.html'">
                <div class="level-title">Level 2 Referrals</div>
                <div class="level-count" id="level2Count">0</div>
            </div>
            
            <div class="level-box" onclick="window.location.href='level3.html'">
                <div class="level-title">Level 3 Referrals</div>
                <div class="level-count" id="level3Count">0</div>
            </div>
            
            <div class="level-box" onclick="window.location.href='level4.html'">
                <div class="level-title">Level 4 Referrals</div>
                <div class="level-count" id="level4Count">0</div>
            </div>
            
            <div class="level-box single" onclick="window.location.href='level5.html'">
                <div class="level-title">Level 5 Referrals</div>
                <div class="level-count" id="level5Count">0</div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2026 CLASSIC MAXIMIZE. All Right reserved.</p>
    </footer>

    <!-- Firebase App (core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- Firebase Auth -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script src="referrals.js"></script>
    <script src="js/support-bubble.js"></script>
</body>
</html>
