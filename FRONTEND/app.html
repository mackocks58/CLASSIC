<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CLASSIC MAXIMIZE • App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        html, body { height: 100%; overflow: hidden; background: #f0f8ff; }
        
        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        
        /* Persistent Top Bar */
        .app-top-bar {
            flex-shrink: 0;
            height: 80px;
            background: white;
            box-shadow: 0 4px 12px rgba(0, 100, 200, 0.15);
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 3px solid #48cae4;
        }
        .app-top-bar.auth-only { display: none; }
        .app-top-bar .top-content {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 50px;
        }
        .app-title { font-weight: 700; font-size: 1.4rem; color: #023e8a; display: flex; align-items: center; gap: 6px; }
        .app-title i { color: #0096c7; }
        .top-balances { display: flex; gap: 16px; font-weight: 600; align-items: center; }
        .balance-item { display: flex; align-items: center; gap: 6px; }
        .balance-value { background: white; padding: 4px 12px; border-radius: 40px; color: #03045e; font-weight: 700; }
        
        /* User Profile Menu */
        .user-menu-container { position: relative; }
        .user-profile {
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        .profile-avatar {
            font-size: 1.6rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0096c7, #48cae4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,96,199,0.2);
        }
        .profile-avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(0,96,199,0.3);
        }
        .user-dropdown {
            position: absolute;
            top: 70px;
            right: 0;
            width: 240px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,100,200,0.2);
            border: 1px solid #90e0ef;
            display: none;
            z-index: 1100;
            overflow: hidden;
        }
        .user-dropdown.active { display: block; }
        .user-info {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .user-name {
            font-weight: 700;
            color: #023e8a;
            margin-bottom: 4px;
        }
        .user-email {
            font-size: 0.85rem;
            color: #2d6a9f;
        }
        .user-menu-divider { height: 1px; background: #e0e0e0; }
        .user-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #023e8a;
            text-decoration: none;
            transition: all 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }
        .user-menu-item:last-child { border-bottom: none; }
        .user-menu-item:hover { background: #f0f8ff; color: #0096c7; }
        .user-menu-item i { width: 20px; }
        
        /* Main content area */
        .app-content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .app-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* Persistent Bottom Nav */
        .app-bottom-nav {
            flex-shrink: 0;
            height: 70px;
            background: white;
            box-shadow: 0 -6px 16px rgba(0, 136, 204, 0.1);
            border-top: 2px solid #90e0ef;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 8px;
            z-index: 1000;
        }
        .app-bottom-nav.auth-only { display: none; }
        .nav-icon {
            font-size: 2rem;
            color: #2d6a9f;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: inherit;
        }
        .nav-icon:hover { background: #e2f0fa; }
        .nav-icon.active { background: #0096c7; color: white; }

        /* Notification Bell Styles */
        .notification-bell {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .bell-icon {
            font-size: 1.7rem;
            color: #023e8a;
            background: rgba(255,255,255,0.7);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }
        .bell-icon:hover { background: rgba(255,255,255,0.9); }
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef233c;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }
        .notification-badge.hidden { display: none; }
        
        .notification-dropdown {
            position: absolute;
            top: 70px;
            right: 10px;
            width: 340px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px #0077b6;
            border: 1px solid #90e0ef;
            display: none;
            z-index: 1100;
            overflow: hidden;
        }
        .notification-dropdown.active { display: block; }
        .dropdown-header {
            padding: 18px;
            background: #caf0f8;
            color: #03045e;
            font-weight: 700;
        }
        .dropdown-body {
            max-height: 360px;
            overflow-y: auto;
        }
        .dropdown-item {
            padding: 14px;
            border-bottom: 1px solid #ade8f4;
            cursor: pointer;
            transition: 0.2s;
        }
        .dropdown-item:hover { background: #e2f0fa; }
        .dropdown-item.unread {
            background: #e6f4ff;
            border-left: 5px solid #0096c7;
        }
        .item-title {
            font-weight: 600;
            color: #023e8a;
            margin-bottom: 4px;
        }
        .item-message {
            font-size: 0.85rem;
            color: #2d6a9f;
        }
        .item-time {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 6px;
        }
        .dropdown-footer {
            padding: 14px;
            text-align: center;
            background: #f8f9ff;
        }
        .view-all-link {
            color: #0077b6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="app-top-bar auth-only" id="appTopBar">
            <div class="top-content">
                <div class="app-title"><i class="fas fa-water"></i> CLASSIC MAXIMIZE</div>
                <div class="top-balances">
                    <div class="balance-item"><i class="fas fa-wallet"></i><span class="balance-value" id="appBalance">0 BWP</span></div>
                    <div class="balance-item"><i class="fas fa-coins"></i><span class="balance-value" id="appDeposited">0 BWP</span></div>
                </div>
                <div class="notification-bell" id="notificationBell">
                    <div class="bell-icon"><i class="fas fa-bell"></i></div>
                    <div class="notification-badge" id="notificationBadge">0</div>
                    <div class="notification-dropdown" id="notificationDropdown">
                        <div class="dropdown-header">🔔 notifications</div>
                        <div class="dropdown-body" id="notificationDropdownBody">loading...</div>
                        <div class="dropdown-footer">
                            <a href="#notifications" class="view-all-link">view all <i class="fas fa-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
                <div class="user-menu-container">
                    <div class="user-profile" id="userProfileBtn">
                        <div class="profile-avatar" id="profileAvatar">👤</div>
                    </div>
                    <div class="user-dropdown" id="userDropdown">
                        <div class="user-info" id="userInfo">
                            <div class="user-name" id="userName">User</div>
                            <div class="user-email" id="userEmail">email@example.com</div>
                        </div>
                        <div class="user-menu-divider"></div>
                        <a href="#account" class="user-menu-item"><i class="fas fa-user"></i> My Account</a>
                        <a href="#" class="user-menu-item" onclick="logout(); return false;"><i class="fas fa-sign-out-alt"></i> Logout</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-content">
            <iframe id="contentFrame" src="login.html" title="App Content"></iframe>
        </main>

        <nav class="app-bottom-nav auth-only" id="appBottomNav">
            <a class="nav-icon" href="#" data-route="dashboard.html" title="Dashboard"><i class="fas fa-home"></i></a>
            <a class="nav-icon" href="#" data-route="deposit.html" title="Deposit"><i class="fas fa-plus-circle"></i></a>
            <a class="nav-icon" href="#" data-route="dash2.html" title="More"><i class="fas fa-th-large"></i></a>
            <a class="nav-icon" href="#" data-route="tasks.html" title="Tasks"><i class="fas fa-tasks"></i></a>
            <a class="nav-icon" href="#" data-route="account.html" title="Account"><i class="fas fa-user-circle"></i></a>
        </nav>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAIX3aQq3VEBq269Jdrk77CefNttqAR51s",
            authDomain: "mozambique-newhope.firebaseapp.com",
            databaseURL: "https://mozambique-newhope-default-rtdb.firebaseio.com",
            projectId: "mozambique-newhope",
            storageBucket: "mozambique-newhope.firebasestorage.app",
            messagingSenderId: "133563964959",
            appId: "1:133563964959:web:d3f183b721d540140f7f2a",
            measurementId: "G-FY6CNVX6ZK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                auth.signOut().then(() => {
                    window.location.hash = '';
                    frame.src = 'login.html';
                }).catch(err => {
                    console.error('Logout error:', err);
                    alert('Error logging out: ' + err.message);
                });
            }
        }

        const frame = document.getElementById('contentFrame');
        const topBar = document.getElementById('appTopBar');
        const bottomNav = document.getElementById('appBottomNav');

        const authPages = ['login.html', 'index.html', 'signup.html'];
        const defaultAuthenticated = 'dashboard.html';

        function isAuthPage(src) {
            return authPages.some(p => (src || '').includes(p));
        }

        function showHideNav() {
            const src = frame.src || '';
            const auth = isAuthPage(src);
            topBar.classList.toggle('auth-only', auth);
            bottomNav.classList.toggle('auth-only', auth);
        }

        function navigateTo(url) {
            // Normalize URL - ensure it ends with .html
            let fullUrl = url.startsWith('http') ? url : (url || 'dashboard.html');
            if (!fullUrl.endsWith('.html')) {
                fullUrl = fullUrl + '.html';
            }
            
            // Load the page
            frame.src = fullUrl;
            
            // Update active state for nav icons
            const routeName = fullUrl.replace('.html', '');
            document.querySelectorAll('.nav-icon').forEach(el => {
                const dataRoute = (el.getAttribute('data-route') || '').replace('.html', '');
                el.classList.toggle('active', dataRoute === routeName);
            });
            
            // Store current page
            window.currentPage = fullUrl;
        }

        function formatAmount(n) {
            return (n || 0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',') + ' BWP';
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                topBar.classList.remove('auth-only');
                bottomNav.classList.remove('auth-only');
                
                // Load user profile
                database.ref('users/' + user.uid).on('value', (s) => {
                    if (s.exists()) {
                        const d = s.val();
                        document.getElementById('appBalance').textContent = formatAmount(d.balance);
                        document.getElementById('appDeposited').textContent = formatAmount(d.deposited);
                        document.getElementById('userName').textContent = d.name || d.phone || 'User';
                        document.getElementById('userEmail').textContent = user.email || 'No email';
                        
                        // Set avatar with first letter
                        const firstLetter = (d.name || d.phone || 'U').charAt(0).toUpperCase();
                        document.getElementById('profileAvatar').textContent = firstLetter;
                    }
                });
                
                // Check if a page is requested via hash
                const hash = window.location.hash.slice(1);
                if (hash && !authPages.some(p => hash.includes(p))) {
                    // Navigate to hashed page
                    navigateTo(hash);
                } else {
                    // Navigate to default authenticated page
                    navigateTo(defaultAuthenticated);
                }
            } else {
                topBar.classList.add('auth-only');
                bottomNav.classList.add('auth-only');
                const hash = window.location.hash.slice(1);
                if (hash === 'signup' || hash.includes('index')) {
                    frame.src = 'index.html';
                } else {
                    frame.src = 'login.html';
                }
            }
        });

        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.slice(1);
            if (hash && !authPages.some(p => hash.includes(p))) {
                // Navigate to the hashed page
                navigateTo(hash);
            }
        });

        document.querySelectorAll('.nav-icon').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const route = btn.getAttribute('data-route');
                if (route) {
                    // Set hash (without .html)
                    const hashName = route.replace('.html', '');
                    window.location.hash = hashName;
                    
                    // Navigate to page
                    navigateTo(route);
                }
            });
        });

        frame.addEventListener('load', () => {
            showHideNav();
            try {
                const doc = frame.contentDocument;
                if (doc && doc.body) {
                    const style = doc.createElement('style');
                    style.textContent = `
                        .top-bar, .bottom-nav, header.top-bar, nav.bottom-nav, 
                        header.app-top-bar, nav.app-bottom-nav,
                        [class*="navbar"], [class*="header"], [class*="nav"] { 
                            display: none !important; 
                        } 
                        .main-content, main, [class*="content"], body { 
                            margin-top: 0 !important; 
                            margin-bottom: 0 !important;
                            padding-top: 0 !important;
                            padding-bottom: 0 !important;
                        }
                        iframe {
                            border: none !important;
                        }
                    `;
                    doc.head.appendChild(style);
                }
            } catch (_) {}
        });

        if (window.location.hash) {
            const route = window.location.hash.slice(1);
            if (route && !authPages.some(p => route.includes(p))) {
                navigateTo(route);
            }
        } else {
            // Set initial page
            navigateTo('dashboard.html');
        }

        // Notification Bell Functionality
        const notificationBell = document.getElementById('notificationBell');
        const notificationDropdown = document.getElementById('notificationDropdown');
        const notificationBadge = document.getElementById('notificationBadge');
        const notificationDropdownBody = document.getElementById('notificationDropdownBody');

        // User Profile Menu Functionality
        const userProfileBtn = document.getElementById('userProfileBtn');
        const userDropdown = document.getElementById('userDropdown');

        if (userProfileBtn) {
            userProfileBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                userDropdown.classList.toggle('active');
                if (notificationDropdown) notificationDropdown.classList.remove('active');
            });
        }

        if (notificationBell) {
            notificationBell.addEventListener('click', (e) => {
                e.stopPropagation();
                notificationDropdown.classList.toggle('active');
                if (userDropdown) userDropdown.classList.remove('active');
            });
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (userDropdown && !userProfileBtn?.contains(e.target) && !userDropdown.contains(e.target)) {
                userDropdown.classList.remove('active');
            }
            if (notificationDropdown && !notificationBell?.contains(e.target) && !notificationDropdown.contains(e.target)) {
                notificationDropdown.classList.remove('active');
            }
        });

        // Close user dropdown when clicking menu items
        const userMenuItems = document.querySelectorAll('.user-menu-item');
        userMenuItems.forEach(item => {
            item.addEventListener('click', () => {
                if (userDropdown) userDropdown.classList.remove('active');
            });
        });

            async function loadNotifications() {
                try {
                    const user = auth.currentUser;
                    if (!user) return;

                    // Load from Firebase
                    const snapshot = await database.ref(`notifications/${user.uid}`).once('value');
                    const notificationsData = snapshot.val() || {};
                    const notifications = Object.entries(notificationsData)
                        .map(([id, data]) => ({ id, ...data }))
                        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
                        .slice(0, 5);

                    // Update badge count
                    const unreadCount = notifications.filter(n => !n.read).length;
                    notificationBadge.textContent = unreadCount;
                    if (unreadCount === 0) {
                        notificationBadge.classList.add('hidden');
                    } else {
                        notificationBadge.classList.remove('hidden');
                    }

                    // Render notifications
                    if (notifications.length === 0) {
                        notificationDropdownBody.innerHTML = '<div style="padding: 20px; text-align: center; color: #999;">No notifications yet</div>';
                    } else {
                        notificationDropdownBody.innerHTML = notifications.map(n => `
                            <div class="dropdown-item ${n.read ? '' : 'unread'}">
                                <div class="item-title">${n.title || 'Notification'}</div>
                                <div class="item-message">${n.message || ''}</div>
                                <div class="item-time">${new Date(n.timestamp || 0).toLocaleDateString()}</div>
                            </div>
                        `).join('');
                    }
                } catch (e) {
                    console.error('Error loading notifications:', e);
                    notificationDropdownBody.innerHTML = '<div style="padding: 20px; text-align: center; color: #d32f2f;">Error loading notifications</div>';
                }
            }

            auth.onAuthStateChanged((user) => {
                if (user) {
                    loadNotifications();
                    // Refresh notifications every 30 seconds
                    setInterval(loadNotifications, 30000);
                } else {
                    notificationDropdownBody.innerHTML = '';
                    notificationBadge.textContent = '0';
                    notificationBadge.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
