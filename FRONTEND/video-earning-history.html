<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earnings History</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffd700;
            --dark: #0f0f1a;
            --light: #f0f0ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff0055;
            --card-bg: rgba(255, 215, 0, 0.05);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--primary);
            color: var(--light);
            min-height: 100vh;
        }
        
        /* NOTIFICATION STYLES */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateX(120%);
            animation: slideIn 0.5s forwards, fadeOut 0.5s forwards 3s;
        }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        .notification i {
            margin-right: 10px;
            font-size: 20px;
        }
        
        .notification.success {
            background-color: var(--secondary);
            color: #000;
        }
        
        .notification.error {
            background-color: var(--danger);
            color: white;
        }
        
        .notification.warning {
            background-color: var(--warning);
            color: #000;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header h1 {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-info {
            text-align: right;
        }
        
        .user-name {
            font-weight: 600;
        }
        
        .user-email {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        
        .user-balance {
            background: rgba(255, 215, 0, 0.1);
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--secondary);
        }
        
        .user-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary);
        }
        
        .earnings-container {
            margin-top: 30px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .earnings-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .earning-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            transition: all 0.3s;
        }
        
        .earning-card:hover {
            border-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .earning-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .earning-date {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .earning-amount {
            color: var(--success);
            font-weight: 600;
            font-size: 18px;
        }
        
        .earning-details {
            margin-top: 10px;
        }
        
        .earning-level {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(110, 0, 255, 0.1);
            color: var(--secondary);
            margin-right: 10px;
        }
        
        .earning-description {
            margin-top: 5px;
            color: rgba(255,255,255,0.9);
        }
        
        .no-earnings {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px dashed rgba(255,255,255,0.1);
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            display: inline-block;
            position: relative;
        }
        
        .spinner::after,
        .spinner::before {
            content: '';  
            box-sizing: border-box;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            position: absolute;
            left: 0;
            top: 0;
            animation: spinner-anim 1s linear infinite;
        }
        
        .spinner::after {
            animation-delay: 0.1s;
        }
        
        @keyframes spinner-anim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
        
        .loading-text {
            color: var(--secondary);
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .user-profile {
                width: 100%;
                justify-content: space-between;
            }
            
            .user-info {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading earnings history...</div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>My Earnings History</h1>
            <div class="user-profile">
                <div class="user-info">
                    <div class="user-name" id="userName">Loading...</div>
                    <div class="user-email" id="userEmail">user@example.com</div>
                </div>
                <div class="user-balance" id="userBalance">0 BWP</div>
                <img src="newhope.png" alt="User" class="user-img" id="userImg">
            </div>
        </div>
        
        <div class="earnings-container">
            <h2 class="section-title">
                <i class="fas fa-coins"></i>
                <span>All Earnings</span>
            </h2>
            
            <div class="earnings-list" id="earningsList">
                <!-- Earnings cards will be loaded here -->
            </div>
            
            <div id="noEarningsMessage" class="no-earnings" style="display: none;">
                <i class="fas fa-coins" style="font-size: 40px; margin-bottom: 15px; color: var(--secondary);"></i>
                <p>No earnings history found</p>
                <p style="margin-top: 10px; font-size: 14px;">Watch videos to start earning</p>
            </div>
            
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Dashboard</span>
            </a>
        </div>
    </div>

    <script src="video-earning-history.js"></script>
</body>
</html>
