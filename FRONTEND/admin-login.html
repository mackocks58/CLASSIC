<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Add Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #4a148c, #7b1fa2);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.15);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0px 10px 40px rgba(123, 31, 162, 0.3);
            width: 350px;
            animation: fadeIn 1s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .login-container h2 {
            text-align: center;
            color: white;
            margin-bottom: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 2px solid white;
            border-radius: 10px;
            outline: none;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: white;
            pointer-events: none;
            transition: 0.3s;
            font-size: 0.95rem;
            opacity: 0.8;
        }
        .input-group input:focus,
        .input-group input:not(:placeholder-shown) {
            border-color: #aa00ff;
            box-shadow: 0px 0px 10px #aa00ff;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: -8px;
            left: 10px;
            font-size: 0.8rem;
            color: #aa00ff;
            opacity: 1;
            background: rgba(123, 31, 162, 0.5);
            padding: 0 5px;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(145deg, #7b1fa2, #4a148c);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 5px #38006b;
            position: relative;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 7px #38006b;
        }
        button:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px #38006b;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Popup Styling */
        .popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            min-width: 250px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #7b1fa2;
            padding: 1rem;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(123, 31, 162, 0.5);
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s ease;
            z-index: 999;
        }
        .popup.show {
            opacity: 1;
            transform: translateX(0);
            animation: glow 1.5s infinite alternate;
        }
        .popup.success { border-left: 5px solid #00c853; }
        .popup.error { border-left: 5px solid #d50000; }
        .popup h4 {
            margin: 0;
            color: #7b1fa2;
        }
        .popup.error h4 {
            color: red;
        }
        .progress-bar {
            height: 5px;
            background: #7b1fa2;
            margin-top: 0.5rem;
            width: 100%;
            animation: countdown linear forwards;
        }
        @keyframes countdown {
            from { width: 100%; }
            to { width: 0%; }
        }
        @keyframes glow {
            from { box-shadow: 0px 0px 10px rgba(170, 0, 255, 0.5); }
            to { box-shadow: 0px 0px 20px rgba(170, 0, 255, 0.8); }
        }
        /* Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .signup-link {
            text-align: center;
            margin-top: 1rem;
            color: white;
        }
        .signup-link a {
            color: #aa00ff;
            text-decoration: none;
            font-weight: bold;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
        .admin-only {
            text-align: center;
            margin-top: 1rem;
            color: #ff4081;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>
    <div class="admin-only">Restricted to administrators only</div>
    <div class="input-group">
        <input type="text" id="phone" placeholder=" " required>
        <label for="phone">Phone Number (with country code)</label>
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Password</label>
    </div>
    <button id="loginBtn" onclick="handleLogin()">
        <span id="btnText">Login as Admin</span>
    </button>
</div>

<!-- Popup -->
<div id="popup" class="popup">
    <h4 id="popupText">Message</h4>
    <div class="progress-bar"></div>
</div>

<script src="admin-login.js"></script>
<script src="js/support-bubble.js"></script>

</body>
</html>
