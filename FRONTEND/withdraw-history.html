<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Withdrawal History</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffd700;
            --dark: #0f0f1a;
            --light: #f0f0ff;
            --danger: #ff0055;
            --success: #00ff88;
            --warning: #ffaa00;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* NOTIFICATION STYLES */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateX(120%);
            animation: slideIn 0.5s forwards, fadeOut 0.5s forwards 3s;
        }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        .notification i {
            margin-right: 10px;
            font-size: 20px;
        }
        
        .notification.success {
            background-color: var(--secondary);
            color: #000;
        }
        
        .notification.error {
            background-color: var(--danger);
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--secondary);
            font-size: 28px;
        }
        
        .user-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: bold;
        }
        
        .back-btn {
            padding: 8px 15px;
            background: rgba(255, 215, 0, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 8px 15px;
            background: rgba(255, 215, 0, 0.1);
            color: var(--secondary);
            border: 1px solid var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: var(--secondary);
            color: #000;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .history-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--secondary);
            transition: all 0.3s;
        }
        
        .history-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1);
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .history-date {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }
        
        .history-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-pending {
            background-color: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }
        
        .status-approved {
            background-color: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }
        
        .status-rejected {
            background-color: rgba(255, 0, 85, 0.2);
            color: var(--danger);
        }
        
        .history-details {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        
        .detail-group {
            flex: 1;
        }
        
        .detail-label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 5px;
        }
        
        .detail-value {
            font-weight: 500;
        }
        
        .amount-after-fee {
            color: rgba(255,255,255,0.7);
            font-size: 12px;
            margin-top: 3px;
        }
        
        .no-history {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            display: inline-block;
            position: relative;
        }
        
        .spinner::after,
        .spinner::before {
            content: '';  
            box-sizing: border-box;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            position: absolute;
            left: 0;
            top: 0;
            animation: spinner-anim 1s linear infinite;
        }
        
        .spinner::after {
            animation-delay: 0.1s;
        }
        
        @keyframes spinner-anim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
        
        .loading-text {
            color: var(--secondary);
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .history-details {
                flex-direction: column;
                gap: 10px;
            }
            
            .detail-group {
                flex: none;
            }
        }
    </style>
</head>
<body>
    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading Withdrawal History...</div>
    </div>
    
    <div class="container">
        <h1>My Withdrawal History</h1>
        
        <div class="user-header">
            <div class="user-info">
                <div class="user-avatar" id="userInitial">U</div>
                <div>
                    <div>Withdrawal Records</div>
                    <div style="font-size: 12px; color: rgba(255,255,255,0.7);" id="currentTime"></div>
                </div>
            </div>
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> Back
            </button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
        </div>
        
        <div class="history-list" id="historyList">
            <!-- History items will be loaded here -->
            <div class="no-history">Loading your withdrawal history...</div>
        </div>
    </div>

    <script src="withdraw.history.js"></script>
</body>
</html>
