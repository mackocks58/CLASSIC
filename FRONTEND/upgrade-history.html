<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Upgrade History</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #000000;
            --secondary: #ffd700;
            --dark: #0f0f1a;
            --light: #f0f0ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff0055;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
        }
        
        /* NOTIFICATION STYLES */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
        }
        
        .notification {
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateX(120%);
            animation: slideIn 0.5s forwards, fadeOut 0.5s forwards 3s;
        }
        
        @keyframes slideIn {
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; }
        }
        
        .notification i {
            margin-right: 10px;
            font-size: 20px;
        }
        
        .notification.success {
            background-color: var(--secondary);
            color: #000;
        }
        
        .notification.error {
            background-color: var(--danger);
            color: white;
        }
        
        .notification.warning {
            background-color: var(--warning);
            color: #000;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(145deg, #1a1a2a, #0f0f1a);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
        }
        
        .user-info {
            text-align: right;
            margin-bottom: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        
        .current-level {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            border: 1px solid var(--secondary);
            text-align: center;
            font-size: 18px;
        }
        
        .current-level-name {
            font-weight: bold;
            color: var(--secondary);
            font-size: 24px;
            text-transform: capitalize;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .history-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--secondary);
        }
        
        .history-count {
            background-color: var(--secondary);
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .history-item {
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid var(--secondary);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .history-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.1);
        }
        
        .history-level {
            font-weight: bold;
            color: var(--secondary);
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .history-date {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
        }
        
        .history-amount {
            color: var(--secondary);
            font-weight: bold;
            font-size: 16px;
        }
        
        .no-history {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 16px;
        }
        
        .back-btn {
            display: block;
            width: 120px;
            padding: 10px;
            margin: 30px auto 0;
            background: var(--secondary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
        }
        
        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
        
        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
        }
        
        .spinner {
            width: 70px;
            height: 70px;
            display: inline-block;
            position: relative;
        }
        
        .spinner::after,
        .spinner::before {
            content: '';  
            box-sizing: border-box;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--secondary);
            position: absolute;
            left: 0;
            top: 0;
            animation: spinner-anim 1s linear infinite;
        }
        
        .spinner::after {
            animation-delay: 0.1s;
        }
        
        @keyframes spinner-anim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 0;
            }
        }
        
        .loading-text {
            color: var(--secondary);
            margin-top: 20px;
            font-size: 16px;
            text-align: center;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .history-amount {
                margin-top: 10px;
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text" id="loadingText">Loading Upgrade History...</div>
    </div>
    
    <div class="container">
        <h1>My Upgrade History</h1>
        
        <div class="user-info">
            Logged in as: <span id="userEmail">Loading...</span>
        </div>
        
        <div class="current-level">
            Current Level: <span class="current-level-name" id="currentLevel">Loading...</span>
        </div>
        
        <div class="history-header">
            <div class="history-title">All Upgrades</div>
            <div class="history-count" id="historyCount">0</div>
        </div>
        
        <div id="historyContainer">
            <div class="no-history">Loading your upgrade history...</div>
        </div>
        
        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <script src="upgrade-history.js"></script>
</body>
</html>
